services:
  - type: web
    name: emmanuil-amsterdam
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_SECRET
        sync: false
